# /etc/portage/make.conf
# ThinkPad X220
# CPU: Intel Core i5-2540M, Sandy Bridge
# GPU: Intel HD Graphics 3000
# RAM: 16GB

# Compiler flags
# Used only for packages built locally from source.
COMMON_FLAGS="-march=sandybridge -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Build parallelism
# Conservative for X220 thermals.
MAKEOPTS="-j2 -l2"
PORTAGE_NICENESS="19"

# Emerge behavior
# Binary packages by default.
# If no compatible binary exists, build from source.
# binpkg-respect-use=y rejects binpkgs that do not match your USE config.
EMERGE_DEFAULT_OPTS="--ask --verbose --quiet-build=y --jobs=1 --load-average=2 --usepkg=y --getbinpkg=y --binpkg-respect-use=y"

# Portage features
# buildpkg saves locally compiled packages for reuse.
FEATURES="clean-logs fail-clean parallel-fetch buildpkg binpkg-multi-instance"

# Licensing
ACCEPT_LICENSE="*"

# Hardware
INPUT_DEVICES="libinput"
VIDEO_CARDS="intel"

# Global USE policy
# Let the Gentoo profile provide sane defaults.
# Only globally disable what you know you do not want.
USE="-systemd -wayland -pulseaudio -bluetooth -gnome -kde"

# CPU feature flags
# Verify later with: cpuid2cpuflags
CPU_FLAGS_X86="aes avx mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"

# Portage directories
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# Locale / messages
LC_MESSAGES=C

# Bootloader
# Use "efi-64" for UEFI installs.
# Use "pc" instead if installing GRUB in legacy BIOS mode.
GRUB_PLATFORMS="efi-64"

# Mirrors
GENTOO_MIRRORS="https://mirror.umd.edu/gentoo/ \
                 https://mirrors.kernel.org/gentoo/ \
                 https://gentoo.osuosl.org/ \
                 https://mirror.clarkson.edu/gentoo/ \
                 https://mirror.lug.udel.edu/pub/gentoo/"
