# /etc/portage/make.conf
# ThinkPad X220
# CPU: Intel Core i5-2540M, Sandy Bridge
# GPU: Intel HD Graphics 3000
# RAM: 16GB

# Compiler flags
# Only affects packages that must be built locally from source.
COMMON_FLAGS="-march=sandybridge -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Conservative fallback compiling for X220 thermals.
MAKEOPTS="-j2 -l1.5"
PORTAGE_NICENESS="19"

# Binary-first Portage behavior.
# Get binary packages whenever possible.
# Accept binary packages even if their USE flags differ.
# Compile from source only when no binary package is available.
EMERGE_DEFAULT_OPTS="--ask --verbose --quiet-build=y --jobs=1 --load-average=1.5 --usepkg=y --getbinpkg=y --binpkg-respect-use=n --rebuilt-binaries=y"

# Save any locally compiled fallback packages for reuse.
FEATURES="clean-logs fail-clean parallel-fetch buildpkg binpkg-multi-instance"

# Licensing
ACCEPT_LICENSE="*"

# Hardware
INPUT_DEVICES="libinput"
VIDEO_CARDS="intel"

# Global USE policy
# Keep this minimal so binaries are easier to use.
# Let the OpenRC/no-systemd profile handle most defaults.
USE="-systemd -wayland dist-kernel"

# CPU feature flags
# Verify later with: cpuid2cpuflags
CPU_FLAGS_X86="aes avx mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"

# Portage directories
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# Locale / messages
LC_MESSAGES=C

# Bootloader
# Use "efi-64" for UEFI installs.
# Use "pc" for legacy BIOS GRUB installs.
GRUB_PLATFORMS="efi-64"

# Mirrors
GENTOO_MIRRORS="https://mirror.umd.edu/gentoo/ \
                 https://mirrors.kernel.org/gentoo/ \
                 https://gentoo.osuosl.org/ \
                 https://mirror.clarkson.edu/gentoo/ \
                 https://mirror.lug.udel.edu/pub/gentoo/"
